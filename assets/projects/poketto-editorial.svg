<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" role="img" aria-label="Poketto. Personal finance tracker. Project cover with a small typographic balance sheet.">
  <rect width="680" height="420" fill="#F3F1EC"/>
  <rect x="0.5" y="0.5" width="679" height="419" fill="none" stroke="#CBC7BE"/>

  <text x="48" y="48" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3" fill="#77746D">PERSONAL FINANCE</text>
  <line x1="48" y1="62" x2="632" y2="62" stroke="#CBC7BE"/>

  <text x="45" y="128" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#161616">Poketto</text>

  <!-- balance sheet rows -->
  <g font-family="ui-monospace, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#2A2A2A">
    <text x="48" y="188">Groceries</text>
    <text x="632" y="188" text-anchor="end" fill="#77746D">- 42.80</text>
    <line x1="48" y1="204" x2="632" y2="204" stroke="#CBC7BE"/>
    <text x="48" y="232">Transport</text>
    <text x="632" y="232" text-anchor="end" fill="#77746D">- 11.25</text>
    <line x1="48" y1="248" x2="632" y2="248" stroke="#CBC7BE"/>
    <text x="48" y="276">Salary</text>
    <text x="632" y="276" text-anchor="end" fill="#315C4C">+ 1,850.00</text>
    <line x1="48" y1="292" x2="632" y2="292" stroke="#CBC7BE"/>
  </g>
  <text x="48" y="318" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#77746D">SAMPLE ENTRIES, ILLUSTRATIVE ONLY</text>

  <line x1="48" y1="352" x2="632" y2="352" stroke="#CBC7BE"/>
  <g font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#77746D">
    <text x="48" y="384">Laravel / Next.js / Flutter</text>
    <text x="632" y="384" text-anchor="end" fill="#315C4C">IN DEVELOPMENT</text>
  </g>
</svg>
