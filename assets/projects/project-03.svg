  <text x="48" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="4" fill="#8B8B9A">SELECTED WORK — 03</text>
  <line x1="48" y1="80" x2="120" y2="80" stroke="url(#accent)" stroke-width="2"/>
  <text x="46" y="140" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#F4F4F5">AKHLAK360</text>
  <text x="48" y="176" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8B8B9A">360-degree employee assessment across six core values.</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8B8B9A">
