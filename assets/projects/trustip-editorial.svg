<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="Trustip. Escrow for social commerce. Featured project cover with a ledger of verified transactions.">
  <rect width="1200" height="380" fill="#F3F1EC"/>
  <rect x="0.5" y="0.5" width="1199" height="379" fill="none" stroke="#CBC7BE"/>

  <text x="72" y="54" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" fill="#77746D">FEATURED / ESCROW PLATFORM</text>
  <text x="1128" y="54" text-anchor="end" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" fill="#77746D">STELLAR / SOROBAN</text>
  <line x1="72" y1="70" x2="1128" y2="70" stroke="#CBC7BE"/>

  <text x="68" y="164" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.5" fill="#161616">Trustip</text>
  <text font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#2A2A2A">
    <tspan x="72" y="210">Funds stay locked in a smart contract until the</tspan>
    <tspan x="72" y="236">buyer confirms delivery. No middleman.</tspan>
  </text>

  <!-- ledger of verified transactions -->
  <g font-family="ui-monospace, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#2A2A2A">
    <line x1="640" y1="118" x2="1128" y2="118" stroke="#CBC7BE"/>
    <text x="640" y="146">ESCROW 0041</text>
    <text x="920" y="146" fill="#77746D">128.00 USDC</text>
    <text x="1128" y="146" text-anchor="end" fill="#315C4C">RELEASED</text>
    <line x1="640" y1="164" x2="1128" y2="164" stroke="#CBC7BE"/>
    <text x="640" y="192">ESCROW 0042</text>
    <text x="920" y="192" fill="#77746D">54.50 USDC</text>
    <text x="1128" y="192" text-anchor="end" fill="#315C4C">RELEASED</text>
    <line x1="640" y1="210" x2="1128" y2="210" stroke="#CBC7BE"/>
    <text x="640" y="238">ESCROW 0043</text>
    <text x="920" y="238" fill="#77746D">210.00 USDC</text>
    <text x="1128" y="238" text-anchor="end" fill="#77746D">LOCKED</text>
    <line x1="640" y1="256" x2="1128" y2="256" stroke="#CBC7BE"/>
  </g>
  <text x="640" y="284" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#77746D">SAMPLE LEDGER, ILLUSTRATIVE ONLY</text>

  <line x1="72" y1="318" x2="1128" y2="318" stroke="#CBC7BE"/>
  <g font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#77746D">
    <text x="72" y="348">TypeScript / Next.js / Rust / Supabase</text>
    <text x="1128" y="348" text-anchor="end" fill="#315C4C">ACTIVE</text>
  </g>
</svg>
